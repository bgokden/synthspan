name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: python -m pip install --upgrade pip pytest
      - name: Run tests (offline; integration tests skip)
        run: pytest -q
        env:
          PYTHONPATH: src

  llm:
    # Real structured-output round-trip via llama-cpp + a tiny GGUF (Ollama can't
    # run in CI, so llama-cpp is the CI-tested endpoint).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install llama-cpp-python (CPU wheel), hub, pytest
        run: |
          python -m pip install --upgrade pip pytest huggingface_hub
          pip install llama-cpp-python \
            --extra-index-url https://abetlen.github.io/llama-cpp-python/whl/cpu
      - name: Fetch tiny GGUF (release asset, then HF fallback; best-effort)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          set +e
          URL="https://github.com/${{ github.repository }}/releases/download/ci-assets/SmolLM2-135M-Instruct-Q4_K_M.gguf"
          curl -fsSL "$URL" -o model.gguf
          if [ -s model.gguf ]; then
            echo "SYNTHSPAN_GGUF=$PWD/model.gguf" >> "$GITHUB_ENV"
            echo "model: fetched from release asset"; exit 0
          fi
          python - <<'PY'
          import os
          try:
              from huggingface_hub import hf_hub_download
              p = hf_hub_download("bartowski/SmolLM2-135M-Instruct-GGUF", "SmolLM2-135M-Instruct-Q4_K_M.gguf")
              open(os.environ["GITHUB_ENV"], "a").write(f"SYNTHSPAN_GGUF={p}\n")
              print("model: fetched from Hugging Face")
          except Exception as e:
              print("model unavailable (integration test will skip):", e)
          PY
      - name: Run llama-cpp integration test (skips if no model)
        run: pytest tests/test_integration.py -k llama_cpp -q -rs
        env:
          PYTHONPATH: src
